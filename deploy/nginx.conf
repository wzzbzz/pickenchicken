# /etc/nginx/sites-available/pickenchicken
# Replace YOUR_DOMAIN with your actual domain (e.g. pickenchicken.com)

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # ── Frontend (React build) ───────────────────────────
    root /var/www/pickenchicken/frontend/build;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # ── API (Symfony) ─────────────────────────────────────
    location /api {
        root /var/www/pickenchicken/api/public;
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/api/index\.php(/|$) {
        root /var/www/pickenchicken/api/public;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    access_log /var/log/nginx/pickenchicken.access.log;
    error_log  /var/log/nginx/pickenchicken.error.log;
}
